<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - 登录</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Chat</h1>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-username">用户名</label>
          <input type="text" id="login-username" placeholder="输入用户名" maxlength="20" required>
        </div>
        <div class="form-group">
          <label for="login-password">密码</label>
          <input type="password" id="login-password" placeholder="输入密码" required>
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn-primary">登录</button>
      </form>
      <form id="register-form" class="auth-form hidden">
        <div class="form-group">
          <label for="register-username">用户名</label>
          <input type="text" id="register-username" placeholder="2-20 个字符" maxlength="20" required>
        </div>
        <div class="form-group">
          <label for="register-password">密码</label>
          <input type="password" id="register-password" placeholder="至少 4 个字符" required>
        </div>
        <div class="form-group">
          <label for="register-confirm">确认密码</label>
          <input type="password" id="register-confirm" placeholder="再次输入密码" required>
        </div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn-primary">注册</button>
      </form>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
